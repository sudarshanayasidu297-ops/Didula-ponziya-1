<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Didula Ponziya</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* Animated Background */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(45deg,#ff0000,#0000ff,#ff0000,#0000ff);
background-size:400% 400%;
animation:bgmove 8s infinite linear;
z-index:-1;
filter:blur(20px);
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
background:rgba(0,0,0,0.6);
padding:40px;
border-radius:20px;
box-shadow:0 0 40px red,0 0 40px blue;
max-width:500px;
}

h1{
font-size:40px;
letter-spacing:3px;
text-shadow:0 0 15px red,0 0 20px blue;
}

img{
width:250px;
border-radius:15px;
margin:20px 0;
box-shadow:0 0 25px red,0 0 25px blue;
}

.contact{
font-size:20px;
margin-top:10px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:linear-gradient(45deg,red,blue);
border-radius:30px;
text-decoration:none;
color:white;
font-weight:bold;
box-shadow:0 0 15px red,0 0 15px blue;
}

</style>
</head>

<body>

<div class="container">

<h1>DIDULA PONZIYA</h1>

<img src="https://files.fm/u/t23fjbb6nz" alt="Photo">

<div class="contact">
📞 Contact : +94760508967
</div>

<a class="btn" href="tel:+94760508967">Call Now</a>

</div>

</body>
</html>
